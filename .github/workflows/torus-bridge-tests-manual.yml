name: Torus Bridge Tests - Manual

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Test scope
        default: full
        type: choice
        options: [full, unit, integration]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  test-torus-bridge:
    # Debug: always run for now to test
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'issue_comment'
    permissions:
      contents: read
      issues: write
    runs-on: ubicloud-standard-2
    steps:
      - name: Debug event info
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Comment body: ${{ github.event.comment.body }}"
          echo "Is PR: ${{ github.event.issue.pull_request }}"
          echo "Issue number: ${{ github.event.issue.number }}"

      - name: Check if should run tests
        id: check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "reason=manual_dispatch" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "issue_comment" ]; then
            COMMENT="${{ github.event.comment.body }}"
            IS_PR="${{ github.event.issue.pull_request }}"
            echo "Comment content: '$COMMENT'"
            echo "Is PR: '$IS_PR'"
            if [[ "$IS_PR" != "null" ]] && [[ "$IS_PR" != "" ]]; then
              if [[ "$COMMENT" == *"/test-bridge"* ]] || [[ "$COMMENT" == *"@test-bridge"* ]]; then
                echo "should_run=true" >> $GITHUB_OUTPUT
                echo "reason=comment_trigger" >> $GITHUB_OUTPUT
              else
                echo "should_run=false" >> $GITHUB_OUTPUT
                echo "reason=wrong_comment" >> $GITHUB_OUTPUT
              fi
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "reason=not_pr" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "reason=unknown_event" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v4
      - name: PNPM setup
        if: steps.check.outputs.should_run == 'true'
        uses: ./.github/actions/setup

      - name: Copy env
        if: steps.check.outputs.should_run == 'true'
        run: cp .env.example .env

      - name: React to valid comment
        if: steps.check.outputs.should_run == 'true' && steps.check.outputs.reason == 'comment_trigger'
        uses: actions/github-script@v7
        with:
          script: |
            // React with eyes emoji to show the comment was read
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

            // React with thumbs up to confirm tests are starting
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '+1'
            });

      - name: Determine test scope
        if: steps.check.outputs.should_run == 'true'
        id: scope
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "scope=${{ inputs.scope }}" >> $GITHUB_OUTPUT
          else
            # For PR comments, detect scope in the comment
            if [[ "$COMMENT" == *"unit"* ]]; then
              echo "scope=unit" >> $GITHUB_OUTPUT
            elif [[ "$COMMENT" == *"integration"* ]]; then
              echo "scope=integration" >> $GITHUB_OUTPUT
            else
              echo "scope=full" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run torus-bridge tests
        if: steps.check.outputs.should_run == 'true'
        run: |
          if [ "${{ steps.scope.outputs.scope }}" == "unit" ]; then
            echo "Running unit tests..."
            pnpm exec turbo run test --continue -F "torus-bridge" -- --testPathPattern="\.unit\.|\.spec\."
          elif [ "${{ steps.scope.outputs.scope }}" == "integration" ]; then
            echo "Running integration tests..."
            pnpm exec turbo run test --continue -F "torus-bridge" -- --testPathPattern="\.integration\.|\.e2e\."
          else
            echo "Running full test suite..."
            pnpm exec turbo run test --continue -F "torus-bridge"
          fi
