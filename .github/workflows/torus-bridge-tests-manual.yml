name: Torus Bridge Tests - Manual

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Test scope
        default: full
        type: choice
        options: [full, unit, integration]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  test-torus-bridge:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (contains(github.event.comment.body, '/test-bridge') ||
        contains(github.event.comment.body, '@test-bridge')))
    permissions:
      contents: read
      issues: write
    runs-on: ubicloud-standard-2
    steps:
      - uses: actions/checkout@v4

      - name: PNPM setup
        uses: ./.github/actions/setup

      - name: Copy env
        run: cp .env.example .env

      - name: React to comment trigger
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            // React with eyes emoji to show the comment was read
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

            // React with thumbs up to confirm tests are starting
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '+1'
            });

      - name: Determine test scope
        id: scope
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "scope=${{ inputs.scope }}" >> $GITHUB_OUTPUT
          else
            # For PR comments, detect scope in the comment
            if [[ "$COMMENT" == *"unit"* ]]; then
              echo "scope=unit" >> $GITHUB_OUTPUT
            elif [[ "$COMMENT" == *"integration"* ]]; then
              echo "scope=integration" >> $GITHUB_OUTPUT
            else
              echo "scope=full" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run torus-bridge tests
        run: |
          if [ "${{ steps.scope.outputs.scope }}" == "unit" ]; then
            echo "Running unit tests..."
            pnpm exec turbo run test --continue -F "torus-bridge" -- --testPathPattern="\.unit\.|\.spec\."
          elif [ "${{ steps.scope.outputs.scope }}" == "integration" ]; then
            echo "Running integration tests..."
            pnpm exec turbo run test --continue -F "torus-bridge" -- --testPathPattern="\.integration\.|\.e2e\."
          else
            echo "Running full test suite..."
            pnpm exec turbo run test --continue -F "torus-bridge"
          fi
