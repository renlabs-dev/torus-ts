name: Torus Bridge Tests - Manual

on:
  workflow_dispatch:
    inputs:
      scope:
        description: Test scope
        default: full
        type: choice
        options: [full, unit, integration]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  test-torus-bridge:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (contains(github.event.comment.body, '/test-bridge') ||
        contains(github.event.comment.body, '@test-bridge')))
    runs-on: ubicloud-standard-2
    steps:
      - name: React to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '+1'
            });

      - uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
      - name: Test
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SCOPE="${{ inputs.scope }}"
          else
            COMMENT="${{ github.event.comment.body }}"
            if [[ "$COMMENT" == *"unit"* ]]; then
              SCOPE="unit"
            elif [[ "$COMMENT" == *"integration"* ]]; then
              SCOPE="integration"
            else
              SCOPE="full"
            fi
          fi

          if [ "$SCOPE" == "unit" ]; then
            pnpm exec turbo run test -F torus-bridge -- --testPathPattern="\.unit\.|\.spec\."
          elif [ "$SCOPE" == "integration" ]; then
            pnpm exec turbo run test -F torus-bridge -- --testPathPattern="\.integration\.|\.e2e\."
          else
            pnpm exec turbo run test -F torus-bridge
          fi
